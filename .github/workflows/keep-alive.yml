# ──────────────────────────────────────────────────────────────────────────────
# keep-alive.yml
#
# Keeps the Render (free-tier) backend alive by pinging its /api/health
# endpoint every 14 minutes between 09:00 and 19:00 IST (03:30–13:30 UTC).
# ──────────────────────────────────────────────────────────────────────────────
name: 🔔 Keep Server Alive (IST 09:00 – 19:00)

on:
  schedule:
    # Runs every 14 minutes within the IST window.
    # IST = UTC + 05:30  →  09:00 IST = 03:30 UTC  |  19:00 IST = 13:30 UTC
    - cron: '30-59/14 3 * * *'                      # 03:30, 03:44, 03:58 UTC
    - cron: '0-28/14  4 * * *'                      # 04:00, 04:14, 04:28 UTC
    - cron: '0,14,28,42,56 5,6,7,8,9,10,11,12 * * *'  # 05:00 – 12:56 UTC
    - cron: '0,14,28 13 * * *'                      # 13:00, 13:14, 13:28 UTC

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  ping:
    name: Ping backend health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 🏓 Ping /api/health
        run: |
          HEALTH_URL="https://ethara-ai-assignment-1v12.onrender.com/api/health"
          echo "📡 Pinging: $HEALTH_URL"

          HTTP_STATUS=$(curl --silent --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            "$HEALTH_URL")

          echo "🔁 HTTP Status: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" -ge 200 && "$HTTP_STATUS" -lt 400 ]]; then
            echo "✅ Server is alive (HTTP $HTTP_STATUS)"
          else
            echo "⚠️  Server returned HTTP $HTTP_STATUS – it may be cold-starting (up to 60s on free plans)."
            exit 0
          fi

